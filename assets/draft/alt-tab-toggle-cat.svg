<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="back-grad" gradientUnits="userSpaceOnUse" x1="60" y1="60" x2="300" y2="300">
            <stop offset="0%" stop-color="#FF0076" />
            <stop offset="100%" stop-color="#590FB7" />
        </linearGradient>
        
        <linearGradient id="front-grad" gradientUnits="userSpaceOnUse" x1="180" y1="180" x2="460" y2="460">
            <stop offset="0%" stop-color="#00F5A0" />
            <stop offset="100%" stop-color="#00D9F5" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-8" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
        </filter>
    </defs>

    <!-- Dark Mobile App Canvas -->
    <rect width="512" height="512" rx="112" fill="#0F172A" />

    <!-- "Previous Window/Workspace" (Standard Window Shape) -->
    <rect x="80" y="80" width="240" height="240" rx="40" fill="url(#back-grad)" />
    <!-- Fake Window UI Header dots -->
    <circle cx="110" cy="110" r="8" fill="#0F172A" opacity="0.3" />
    <circle cx="134" cy="110" r="8" fill="#0F172A" opacity="0.3" />

    <!-- "Current Window/Workspace" (The Fierce Toggle Cat Circle) -->
    <g filter="url(#shadow)">
        <!-- Giant geometric toggle ears -->
        <polygon points="266,210 200,80 300,180" fill="url(#front-grad)" />
        <polygon points="400,210 466,80 366,180" fill="url(#front-grad)" />
        
        <!-- The Fierce Toggle Base -->
        <circle cx="330" cy="330" r="140" fill="url(#front-grad)" />
        
        <!-- The Fierce Toggle Eyes (Angled Triangle Slits) -->
        <polygon points="260,310 310,330 260,340" fill="#0F172A" />
        <polygon points="400,310 350,330 400,340" fill="#0F172A" />
    </g>
</svg>