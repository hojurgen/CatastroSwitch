<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Front Cat (Orange/Hot Pink) -->
        <linearGradient id="front-grad" gradientUnits="userSpaceOnUse" x1="130" y1="150" x2="490" y2="510">
            <stop offset="0%" stop-color="#FF3366" />
            <stop offset="100%" stop-color="#FF9933" />
        </linearGradient>

        <!-- Middle Window (Bright Magenta/Purple) -->
        <linearGradient id="mid-grad" gradientUnits="userSpaceOnUse" x1="70" y1="90" x2="410" y2="430">
            <stop offset="0%" stop-color="#B100FF" />
            <stop offset="100%" stop-color="#FF00E4" />
        </linearGradient>

        <!-- Back Window (Electric Cyan/Mint) -->
        <linearGradient id="back-grad" gradientUnits="userSpaceOnUse" x1="10" y1="30" x2="330" y2="350">
            <stop offset="0%" stop-color="#00C9FF" />
            <stop offset="100%" stop-color="#92FE9D" />
        </linearGradient>

        <!-- Hard drop shadow -->
        <filter id="hard-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-8" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
    </defs>

    <!-- Speed Stack -->
    <rect x="10" y="30" width="320" height="320" rx="64" fill="url(#back-grad)" filter="url(#hard-shadow)"/>
    <rect x="70" y="90" width="340" height="340" rx="72" fill="url(#mid-grad)" filter="url(#hard-shadow)"/>

    <!-- Current Context / The "Hyper-Focused & Excited" Cat Window -->
    <g filter="url(#hard-shadow)">
        <!-- Symmetrical, Alert, Swept-Back Ears for "Velocity" -->
        <polygon points="170,160 140,40 240,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        <polygon points="450,160 480,40 380,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        
        <!-- Inner Ears (Now pure black for maximum contrast) -->
        <polygon points="175,140 155,70 215,140" fill="#060410" />
        <polygon points="445,140 465,70 405,140" fill="#060410" />

        <!-- Main Face Container -->
        <rect x="130" y="150" width="360" height="360" rx="80" fill="url(#front-grad)" />
        
        <!-- HYPER-FOCUSED EYES: Removed white reflections -->
        <!-- Left Eye -->
        <g transform="translate(240, 260) rotate(-5)">
            <ellipse cx="0" cy="0" rx="42" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="14" />
            <ellipse cx="0" cy="0" rx="16" ry="42" fill="#060410" />
        </g>

        <!-- Right Eye -->
        <g transform="translate(380, 260) rotate(5)">
            <ellipse cx="0" cy="0" rx="42" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="14" />
            <ellipse cx="0" cy="0" rx="16" ry="42" fill="#060410" />
        </g>

        <!-- Sharp Cute Nose -->
        <polygon points="295,330 325,330 310,345" fill="#060410" stroke="#060410" stroke-width="10" stroke-linejoin="round" />

        <!-- Excited / Locked-In Grin -->
        <path d="M 260 350 Q 285 375 310 350 Q 335 375 360 350" fill="none" stroke="#060410" stroke-width="14" stroke-linecap="round" />
        <!-- Open yelling mouth -->
        <path d="M 275 355 Q 310 410 345 355 Z" fill="#060410" stroke="#060410" stroke-width="10" stroke-linejoin="round" />
        
        <!-- Intense, sharp symmetrical fangs -->
        <polygon points="275,355 292,355 283,375" fill="#FFFFFF" stroke="#060410" stroke-width="6" stroke-linejoin="round" />
        <polygon points="345,355 328,355 337,375" fill="#FFFFFF" stroke="#060410" stroke-width="6" stroke-linejoin="round" />

        <!-- Pink Tongue flash in the back of the mouth -->
        <path d="M 290 375 Q 310 400 330 375 Z" fill="#FF3366" />

        <!-- Aerodynamic SWEPT BACK whiskers -->
        <!-- Left Side -->
        <path d="M 240 355 L 110 325" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        <path d="M 245 385 L 130 380" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        
        <!-- Right Side -->
        <path d="M 380 355 L 510 325" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        <path d="M 375 385 L 490 380" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
    </g>
</svg>