<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="solid-grad" gradientUnits="userSpaceOnUse" x1="200" y1="200" x2="480" y2="480">
            <stop offset="0%" stop-color="#FF3366" />
            <stop offset="100%" stop-color="#FF9933" />
        </linearGradient>

        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="512" height="512" rx="112" fill="#060410" />

    <!-- Speed Stack -->
    <rect x="50" y="50" width="220" height="220" rx="40" fill="none" stroke="#7928CA" stroke-width="12" filter="url(#neon-glow)" opacity="0.6" />
    <rect x="110" y="110" width="240" height="240" rx="48" fill="none" stroke="#FF0080" stroke-width="16" filter="url(#neon-glow)" opacity="0.8" />
    <rect x="180" y="180" width="240" height="240" rx="56" fill="none" stroke="#FF512F" stroke-width="20" filter="url(#neon-glow)" opacity="1.0" />

    <!-- Current Context: Derpy / Chill Cat -->
    <g>
        <polygon points="270,250 240,110 320,240" fill="url(#solid-grad)" />
        <polygon points="450,250 480,110 400,240" fill="url(#solid-grad)" />
        
        <rect x="250" y="250" width="240" height="240" rx="64" fill="url(#solid-grad)" />
        
        <!-- Happy closed eyes ^_^ -->
        <path d="M 290 350 Q 310 320 330 350" stroke="#060410" stroke-width="16" stroke-linecap="round" fill="none" />
        <path d="M 410 350 Q 430 320 450 350" stroke="#060410" stroke-width="16" stroke-linecap="round" fill="none" />
        <!-- Happy OwO Mouth -->
        <path d="M 350 400 Q 360 420 370 400 Q 380 420 390 400" stroke="#060410" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
</svg>