<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Front Cat (Orange/Hot Pink) -->
        <linearGradient id="front-grad" gradientUnits="userSpaceOnUse" x1="130" y1="150" x2="490" y2="510">
            <stop offset="0%" stop-color="#FF3366" />
            <stop offset="100%" stop-color="#FF9933" />
        </linearGradient>

        <!-- Middle Window (Bright Magenta/Purple) -->
        <linearGradient id="mid-grad" gradientUnits="userSpaceOnUse" x1="70" y1="90" x2="410" y2="430">
            <stop offset="0%" stop-color="#B100FF" />
            <stop offset="100%" stop-color="#FF00E4" />
        </linearGradient>

        <!-- Back Window (Electric Cyan/Mint) -->
        <linearGradient id="back-grad" gradientUnits="userSpaceOnUse" x1="10" y1="30" x2="330" y2="350">
            <stop offset="0%" stop-color="#00C9FF" />
            <stop offset="100%" stop-color="#92FE9D" />
        </linearGradient>

        <!-- Hard drop shadow -->
        <filter id="hard-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-8" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
    </defs>

    <!-- Speed Stack -->
    <rect x="10" y="30" width="320" height="320" rx="64" fill="url(#back-grad)" filter="url(#hard-shadow)"/>
    <rect x="70" y="90" width="340" height="340" rx="72" fill="url(#mid-grad)" filter="url(#hard-shadow)"/>

    <!-- Current Context / The Cat Window -->
    <g filter="url(#hard-shadow)">
        <!-- Outer Ears (Removed the inner ear polygon to prevent 16x16 pixel muddiness) -->
        <polygon points="170,160 150,40 240,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        <polygon points="450,160 470,40 380,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        
        <!-- Main Face Container -->
        <rect x="130" y="150" width="360" height="360" rx="80" fill="url(#front-grad)" />
        
        <!-- Left Eye (Simplified to massive solid shapes) -->
        <ellipse cx="240" cy="255" rx="35" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="16" />
        <ellipse cx="240" cy="255" rx="14" ry="38" fill="#060410" />

        <!-- Right Eye -->
        <ellipse cx="380" cy="255" rx="35" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="16" />
        <ellipse cx="380" cy="255" rx="14" ry="38" fill="#060410" />
        
        <!-- Nose -->
        <polygon points="290,315 330,315 310,335" fill="#060410" stroke="#060410" stroke-width="10" stroke-linejoin="round" />

        <!-- Bold simplified Muzzle curve (The ":3") -->
        <path d="M 255 335 Q 285 365 310 335 Q 335 365 365 335" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />

        <!-- Huge Yelling Mouth (Single bold shape, removed fangs/tongue details) -->
        <path d="M 285 350 Q 310 415 335 350 Z" fill="#060410" stroke="#060410" stroke-width="8" stroke-linejoin="round" />

        <!-- Whiskers (Reduced from 3 to 2, thickened significantly for contrast) -->
        <path d="M 240 350 L 140 330" stroke="#060410" stroke-width="20" stroke-linecap="round" />
        <path d="M 240 380 L 150 400" stroke="#060410" stroke-width="20" stroke-linecap="round" />
        
        <path d="M 380 350 L 480 330" stroke="#060410" stroke-width="20" stroke-linecap="round" />
        <path d="M 380 380 L 470 400" stroke="#060410" stroke-width="20" stroke-linecap="round" />
    </g>
</svg>