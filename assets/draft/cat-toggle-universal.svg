<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- High-energy neon gradient -->
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF0080" />
            <stop offset="100%" stop-color="#7928CA" />
        </linearGradient>
        
        <!-- Drop shadow for the toggle knob to give it depth on mobile -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-8" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
        </filter>
    </defs>

    <!-- 
      Base Background:
      Scaled to 512x512 and uses rx="112" for a standalone squircle look.
      The padding handles mobile OS masks (e.g., iOS circle/squircle crops) naturally. 
    -->
    <rect width="512" height="512" rx="112" fill="url(#bg-gradient)" />
    
    <!-- 
      Toggle Track:
      Enlarged and centered to keep the icon readable scaling down to 16x16 or 32x32 Taskbar sizes.
    -->
    <rect x="76" y="176" width="360" height="160" rx="80" fill="#1A1A1A" />
    
    <!-- 
      Motion Line: 
      Simplified from 3 lines to 1 bold line so it doesn't turn into a blurry smudge on small taskbar icons.
    -->
    <line x1="130" y1="256" x2="230" y2="256" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" opacity="0.25" />
    
    <!-- Cat Toggle Knob Group (with shadow for modern app UI depth) -->
    <g filter="url(#shadow)">
        <!-- 
          Cat Ears:
          Thicker and integrated seamlessly into the main circle. 
        -->
        <path d="M 290 206 L 316 110 L 356 176" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" />
        <path d="M 422 206 L 396 110 L 356 176" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" />
        
        <!-- Cat Head -->
        <circle cx="356" cy="256" r="80" fill="#FFFFFF" />
        
        <!-- 
          Fierce Eyes:
          Simplified to bold geometric triangles for maximum legibility at tiny taskbar scales.
        -->
        <polygon points="310,245 345,255 310,260" fill="#1A1A1A" />
        <polygon points="402,245 367,255 402,260" fill="#1A1A1A" />
    </g>
</svg>