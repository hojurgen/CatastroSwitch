<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF0080" />
            <stop offset="100%" stop-color="#7928CA" />
        </linearGradient>
    </defs>
    <!-- Dark rounded app frame -->
    <rect width="256" height="256" rx="56" fill="url(#grad1)" />
    
    <!-- Switch Track -->
    <rect x="32" y="88" width="192" height="80" rx="40" fill="#111111" />
    
    <!-- Motion / Speed lines inside switch -->
    <path d="M 50 128 L 100 128" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <path d="M 60 104 L 85 104" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
    <path d="M 60 152 L 85 152" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
    
    <!-- Cat Toggle Knob -->
    <circle cx="172" cy="128" r="32" fill="#ffffff" />
    <!-- Cat Ears -->
    <polygon points="146,110 156,76 172,100" fill="#ffffff" />
    <polygon points="198,110 188,76 172,100" fill="#ffffff" />
    
    <!-- Fierce / Focused Eyes -->
    <path d="M 154 125 L 166 128 L 154 131 Z" fill="#111111" />
    <path d="M 190 125 L 178 128 L 190 131 Z" fill="#111111" />
</svg>