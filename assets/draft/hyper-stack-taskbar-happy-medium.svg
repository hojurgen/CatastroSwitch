<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Front Cat (Orange/Hot Pink) -->
        <linearGradient id="front-grad" gradientUnits="userSpaceOnUse" x1="130" y1="150" x2="490" y2="510">
            <stop offset="0%" stop-color="#FF3366" />
            <stop offset="100%" stop-color="#FF9933" />
        </linearGradient>

        <!-- Middle Window (Bright Magenta/Purple) -->
        <linearGradient id="mid-grad" gradientUnits="userSpaceOnUse" x1="70" y1="90" x2="410" y2="430">
            <stop offset="0%" stop-color="#B100FF" />
            <stop offset="100%" stop-color="#FF00E4" />
        </linearGradient>

        <!-- Back Window (Electric Cyan/Mint) -->
        <linearGradient id="back-grad" gradientUnits="userSpaceOnUse" x1="10" y1="30" x2="330" y2="350">
            <stop offset="0%" stop-color="#00C9FF" />
            <stop offset="100%" stop-color="#92FE9D" />
        </linearGradient>

        <!-- Hard drop shadow -->
        <filter id="hard-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-8" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
    </defs>

    <!-- Speed Stack -->
    <rect x="10" y="30" width="320" height="320" rx="64" fill="url(#back-grad)" filter="url(#hard-shadow)"/>
    <rect x="70" y="90" width="340" height="340" rx="72" fill="url(#mid-grad)" filter="url(#hard-shadow)"/>

    <!-- Current Context / The Cat Window -->
    <g filter="url(#hard-shadow)">
        <!-- Outer Ears -->
        <polygon points="170,160 150,40 240,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        <polygon points="450,160 470,40 380,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        
        <!-- Inner Ears (Restored for depth, simplified to solid shapes) -->
        <polygon points="180,140 165,70 215,140" fill="#B100FF" />
        <polygon points="440,140 455,70 405,140" fill="#B100FF" />

        <!-- Main Face Container -->
        <rect x="130" y="150" width="360" height="360" rx="80" fill="url(#front-grad)" />
        
        <!-- Left Eye (Slanted, prominent pupil, large catchlight restored) -->
        <g transform="translate(240, 260) rotate(-10)">
            <ellipse cx="0" cy="0" rx="35" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="14" />
            <ellipse cx="0" cy="0" rx="12" ry="38" fill="#060410" />
            <!-- Bold catchlight (Scaled up so it survives shrinking) -->
            <circle cx="-10" cy="-20" r="12" fill="#FFFFFF" />
        </g>

        <!-- Right Eye -->
        <g transform="translate(380, 260) rotate(10)">
            <ellipse cx="0" cy="0" rx="35" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="14" />
            <ellipse cx="0" cy="0" rx="12" ry="38" fill="#060410" />
            <!-- Catchlight stays on same side to mimic directional light -->
            <circle cx="-10" cy="-20" r="12" fill="#FFFFFF" />
        </g>

        <!-- Nose -->
        <polygon points="295,320 325,320 310,335" fill="#060410" stroke="#060410" stroke-width="10" stroke-linejoin="round" />

        <!-- Muzzle curve (Restored biological chubby cheeks) -->
        <path d="M 260,335 Q 285,360 310,335 Q 335,360 360,335" fill="none" stroke="#060410" stroke-width="14" stroke-linecap="round" />

        <!-- Yelling/Happy Open Mouth WITH solid pink tongue -->
        <path d="M 275 340 Q 310 405 345 340 Z" fill="#060410" stroke="#060410" stroke-width="10" stroke-linejoin="round" />
        <!-- Tongue (Restored color pop) -->
        <path d="M 285 360 Q 310 395 335 360 Z" fill="#FF3366" />
        
        <!-- Whiskers (Reduced to 2 per side, but gracefully curved) -->
        <!-- Left Side -->
        <path d="M 245 340 Q 150 320 120 340" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        <path d="M 255 365 Q 160 380 130 405" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        
        <!-- Right Side -->
        <path d="M 375 340 Q 470 320 500 340" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        <path d="M 365 365 Q 460 380 490 405" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
    </g>
</svg>