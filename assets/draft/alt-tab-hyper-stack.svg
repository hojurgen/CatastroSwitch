<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="solid-grad" gradientUnits="userSpaceOnUse" x1="200" y1="200" x2="480" y2="480">
            <stop offset="0%" stop-color="#FF3366" />
            <stop offset="100%" stop-color="#FF9933" />
        </linearGradient>

        <!-- A strong neon glow filter for the wireframes -->
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Deep Space Canvas -->
    <rect width="512" height="512" rx="112" fill="#060410" />

    <!-- Speed Stack / Workspace History (Wireframes shooting forward) -->
    
    <!-- Oldest context (Deep Purple) -->
    <rect x="50" y="50" width="220" height="220" rx="40" fill="none" stroke="#7928CA" stroke-width="12" filter="url(#neon-glow)" opacity="0.4" />
    
    <!-- Medium context (Hot Pink) -->
    <rect x="110" y="110" width="240" height="240" rx="48" fill="none" stroke="#FF0080" stroke-width="16" filter="url(#neon-glow)" opacity="0.7" />
    
    <!-- Recent context (Bright Orange) -->
    <rect x="180" y="180" width="240" height="240" rx="56" fill="none" stroke="#FF512F" stroke-width="20" filter="url(#neon-glow)" opacity="0.9" />

    <!-- Current Context / The "Active" Cat Window -->
    <g filter="url(#shadow)">
        <!-- Ears breaking the square silhouette -->
        <polygon points="270,250 240,110 320,240" fill="url(#solid-grad)" />
        <polygon points="450,250 480,110 400,240" fill="url(#solid-grad)" />
        
        <!-- Main Window -->
        <rect x="250" y="250" width="240" height="240" rx="64" fill="url(#solid-grad)" />
        
        <!-- Focused abstract eyes to maintain 16x16 readability -->
        <rect x="300" y="340" width="40" height="16" rx="8" fill="#060410" />
        <rect x="400" y="340" width="40" height="16" rx="8" fill="#060410" />
    </g>
</svg>