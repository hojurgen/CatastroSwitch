<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Front Cat (Orange/Hot Pink) -->
        <linearGradient id="front-grad" gradientUnits="userSpaceOnUse" x1="130" y1="150" x2="490" y2="510">
            <stop offset="0%" stop-color="#FF3366" />
            <stop offset="100%" stop-color="#FF9933" />
        </linearGradient>

        <!-- Middle Window (Bright Magenta/Purple) -->
        <linearGradient id="mid-grad" gradientUnits="userSpaceOnUse" x1="70" y1="90" x2="410" y2="430">
            <stop offset="0%" stop-color="#B100FF" />
            <stop offset="100%" stop-color="#FF00E4" />
        </linearGradient>

        <!-- Back Window (Electric Cyan/Mint) -->
        <linearGradient id="back-grad" gradientUnits="userSpaceOnUse" x1="10" y1="30" x2="330" y2="350">
            <stop offset="0%" stop-color="#00C9FF" />
            <stop offset="100%" stop-color="#92FE9D" />
        </linearGradient>

        <!-- Hard drop shadow -->
        <filter id="hard-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-8" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
    </defs>

    <!-- Speed Stack -->
    <rect x="10" y="30" width="320" height="320" rx="64" fill="url(#back-grad)" filter="url(#hard-shadow)"/>
    <rect x="70" y="90" width="340" height="340" rx="72" fill="url(#mid-grad)" filter="url(#hard-shadow)"/>

    <!-- Current Context / Optimal Developer Cat -->
    <g filter="url(#hard-shadow)">
        <!-- Symmetrical, sharp swept-back ears with heavy black inlays for extreme contrast -->
        <polygon points="170,160 140,40 240,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        <polygon points="450,160 480,40 380,160" fill="url(#front-grad)" stroke="url(#front-grad)" stroke-width="20" stroke-linejoin="round" />
        
        <polygon points="175,140 155,70 215,140" fill="#060410" />
        <polygon points="445,140 465,70 405,140" fill="#060410" />

        <!-- Main Face Container -->
        <rect x="130" y="150" width="360" height="360" rx="80" fill="url(#front-grad)" />
        
        <!-- OPTIMAL EYES: Restored green glow, black slits, and added a solid black border -->
        <!-- Left Eye -->
        <g transform="translate(240, 260) rotate(-10)">
            <ellipse cx="0" cy="0" rx="35" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="8" />
            <ellipse cx="0" cy="0" rx="14" ry="40" fill="#060410" />
        </g>

        <!-- Right Eye -->
        <g transform="translate(380, 260) rotate(10)">
            <ellipse cx="0" cy="0" rx="35" ry="50" fill="#00FF9D" stroke="#060410" stroke-width="8" />
            <ellipse cx="0" cy="0" rx="14" ry="40" fill="#060410" />
        </g>

        <!-- Sharp Nose -->
        <polygon points="295,335 325,335 310,350" fill="#060410" stroke="#060410" stroke-width="12" stroke-linejoin="round" />

        <!-- Minimalist Wide Grin -->
        <path d="M 235 355 Q 285 390 310 355 Q 335 390 385 355" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />

        <!-- Alert / Happy whiskers (Swept UP and OUT, no more drooping!) -->
        <!-- Left Side -->
        <path d="M 220 370 L 110 350" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        <path d="M 230 400 L 130 395" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        
        <!-- Right Side -->
        <path d="M 400 370 L 510 350" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
        <path d="M 390 400 L 490 395" fill="none" stroke="#060410" stroke-width="16" stroke-linecap="round" />
    </g>
</svg>