<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="solid-grad" gradientUnits="userSpaceOnUse" x1="120" y1="140" x2="480" y2="500">
            <stop offset="0%" stop-color="#FF3366" />
            <stop offset="100%" stop-color="#FF9933" />
        </linearGradient>

        <linearGradient id="stack-back" gradientUnits="userSpaceOnUse" x1="32" y1="52" x2="392" y2="412">
            <stop offset="0%" stop-color="#590FB7" />
            <stop offset="100%" stop-color="#7928CA" />
        </linearGradient>

        <linearGradient id="stack-mid" gradientUnits="userSpaceOnUse" x1="76" y1="96" x2="436" y2="456">
            <stop offset="0%" stop-color="#FF0080" />
            <stop offset="100%" stop-color="#DD2476" />
        </linearGradient>

        <filter id="box-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-8" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
        
        <filter id="stack-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-4" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
        </filter>
    </defs>

    <!-- NO BACKGROUND RECT (Transparent) -->

    <!-- Solid Speed Stack (Refined for extreme downscaling) -->
    <!-- Instead of thin glowing lines that vanish at 16x16, these solid fills create a bold, unmistakable cascade -->
    <rect x="32" y="52" width="310" height="310" rx="64" fill="url(#stack-back)" filter="url(#stack-shadow)" opacity="0.8"/>
    <rect x="76" y="96" width="330" height="330" rx="72" fill="url(#stack-mid)" filter="url(#stack-shadow)" opacity="0.9"/>

    <!-- Current Context / The Cat Window (Scaled massively up) -->
    <g filter="url(#box-shadow)">
        <!-- Proportional, slightly rounded ears -->
        <!-- Placed to balance perfectly without exceeding top margin -->
        <polygon points="160,150 140,40 230,150" fill="url(#solid-grad)" stroke="url(#solid-grad)" stroke-width="24" stroke-linejoin="round" />
        <polygon points="440,150 460,40 370,150" fill="url(#solid-grad)" stroke="url(#solid-grad)" stroke-width="24" stroke-linejoin="round" />
        
        <!-- Scaled up main face canvas to dominate the composition -->
        <rect x="120" y="140" width="360" height="360" rx="80" fill="url(#solid-grad)" />
        
        <!-- Massive, ultra-legible triangular eyes (Pointed inward) -->
        <polygon points="170,270 170,330 250,300" fill="#060410" stroke="#060410" stroke-width="20" stroke-linejoin="round" />
        <polygon points="430,270 430,330 350,300" fill="#060410" stroke="#060410" stroke-width="20" stroke-linejoin="round" />
        
        <!-- Thick, visible nose anchor -->
        <polygon points="280,360 320,360 300,380" fill="#060410" stroke="#060410" stroke-width="16" stroke-linejoin="round" />
    </g>
</svg>