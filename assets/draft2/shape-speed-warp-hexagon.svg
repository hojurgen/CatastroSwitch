<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- SHAPE: Fast-Forward Speed Warp Hexagon (Speedrunning Workspaces) -->
    <defs>
        <linearGradient id="warp-bg" x1="0" y1="0" x2="512" y2="512">
            <stop offset="0%" stop-color="#00DEFF" />
            <stop offset="100%" stop-color="#0A3F9F" />
        </linearGradient>
        <linearGradient id="warp-cat" x1="0" y1="0" x2="512" y2="0">
            <stop offset="0%" stop-color="#FFDE00" />
            <stop offset="100%" stop-color="#FF3366" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="-10" dy="10" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <!-- Slanted Hexagon Shape (Fast Forward / Speedrun) -->
    <polygon points="100,30 450,30 412,482 62,482" fill="url(#warp-bg)" filter="url(#shadow)" />
    
    <!-- Outer rim for contrast -->
    <polygon points="100,30 450,30 412,482 62,482" fill="none" stroke="#FFFFFF" stroke-width="10" />

    <g filter="url(#shadow)" transform="scale(1.1) translate(-20, -20) skewX(-15)">
        <!-- Aerodynamic / Swept back ears -->
        <polygon points="160,250 140,90 260,200" fill="url(#warp-cat)" />
        <polygon points="400,250 440,90 320,200" fill="url(#warp-cat)" />

        <!-- Stretched elongated head -->
        <ellipse cx="280" cy="300" rx="140" ry="100" fill="url(#warp-cat)" />

        <!-- Hyper-focused narrowed eyes -->
        <ellipse cx="210" cy="280" rx="40" ry="15" fill="#FFFFFF" />
        <ellipse cx="210" cy="280" rx="15" ry="15" fill="#0A3F9F" />

        <ellipse cx="350" cy="280" rx="40" ry="15" fill="#FFFFFF" />
        <ellipse cx="350" cy="280" rx="15" ry="15" fill="#0A3F9F" />

        <!-- Motion blurred whiskers extending past the hexagon -->
        <path d="M 160 300 L -20 300" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />
        <path d="M 170 330 L 10 330" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />
        
        <path d="M 400 300 L 580 300" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />
        <path d="M 390 330 L 550 330" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />

        <!-- Tiny focused nose -->
        <polygon points="270,330 290,330 280,345" fill="#0A3F9F" />
    </g>
</svg>