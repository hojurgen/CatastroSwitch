<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- SHAPE: The literal Toggle Switch (CatastroSwitch toggle track) -->
    <!-- Taskbar Optimized: Huge, thick strokes and simple geometry means it reads perfectly at 16x16 -->
    <defs>
        <linearGradient id="track-grad" gradientUnits="userSpaceOnUse" x1="32" y1="128" x2="480" y2="384">
            <stop offset="0%" stop-color="#280A4F" />
            <stop offset="100%" stop-color="#5C2D91" />
        </linearGradient>
        <linearGradient id="knob-grad" gradientUnits="userSpaceOnUse" x1="200" y1="96" x2="520" y2="416">
            <stop offset="0%" stop-color="#00DEFF" />
            <stop offset="100%" stop-color="#F032A6" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="-10" dy="10" stdDeviation="5" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
    </defs>

    <!-- The Toggle Track (Background Pill) -->
    <rect x="32" y="128" width="448" height="256" rx="128" fill="url(#track-grad)" stroke="#111" stroke-width="24" filter="url(#shadow)" />
    
    <!-- Motion lines (leaving the left side empty as the toggle slams right) -->
    <path d="M 80 200 L 160 200 M 64 256 L 190 256 M 80 312 L 160 312" fill="none" stroke="#B100FF" stroke-width="24" stroke-linecap="round" />

    <!-- The Toggle Knob (The Cat) slammed to the "ON" (Panic) position -->
    <g filter="url(#shadow)">
        <!-- Cat ears on the knob -->
        <polygon points="270,160 290,30 350,130" fill="url(#knob-grad)" stroke="#111" stroke-width="24" stroke-linejoin="round" />
        <polygon points="450,160 430,30 370,130" fill="url(#knob-grad)" stroke="#111" stroke-width="24" stroke-linejoin="round" />
        
        <!-- The Round Knob Face -->
        <circle cx="360" cy="256" r="140" fill="url(#knob-grad)" stroke="#111" stroke-width="24" />

        <!-- Dizzy / Chaotic Eyes -->
        <!-- Left eye -->
        <path d="M 290 210 L 330 260 M 330 210 L 290 260" fill="none" stroke="#111" stroke-width="24" stroke-linecap="round" />
        <!-- Right eye -->
        <path d="M 390 210 L 430 260 M 430 210 L 390 260" fill="none" stroke="#111" stroke-width="24" stroke-linecap="round" />

        <!-- Yelling open mouth -->
        <ellipse cx="360" cy="320" rx="30" ry="40" fill="#111" />
    </g>
</svg>